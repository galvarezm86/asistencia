{% extends "base.html" %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}

<div class="form-card">
    
    <h1>Iniciar sesión</h1>

    <form method="POST">
        <input
            type="hidden"
            name="csrf_token"
            value="{{ session.csrf_token }}"
        >

        <label for="username">
            Usuario
        </label>

        <input
            type="text"
            id="username"
            name="username"
            required
        >

        <br><br>

        <label for="password">
            Contraseña
        </label>

        <input
            type="password"
            id="password"
            name="password"
            required
        >

        <br><br>

        <button
            type="submit"
            class="btn btn-primary"
        >
            Entrar
        </button>

    </form>
</div>
    {% if error %}
    <p>{{ error }}</p>
    {% endif %}

{% endblock %}
