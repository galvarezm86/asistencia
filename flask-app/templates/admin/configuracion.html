{% extends "base.html" %}

{% block title %}
Panel de administración
{% endblock %}

{% block content %}

<form
  method="POST"
  action="{{ url_for('editar_correo') }}"
>

  <input
      type="hidden"
      name="csrf_token"
      value="{{ session.csrf_token }}"
  >

  <label for="correo">
      Modificar correo
  </label>

  <input
      type="email"
      id="correo"
      name="correo"
      value="{{ correo }}"
      required
  >

  <button
      type="submit"
      class="btn btn-primary"
  >
      Guardar correo
  </button>

</form>

<section class="card">


<h2>Información actual</h2>

<p>
    <strong>Correo actual:</strong>
    {{ correo }}
</p>




</section>
